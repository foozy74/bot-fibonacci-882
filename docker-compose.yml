# Fibonacci-882 Master Compose
services:
  backend:
    build: ./fibonacci-882-platform/backend
    container_name: fib882-backend
    environment:
      - BITUNIX_API_KEY=${BITUNIX_API_KEY:-}
      - BITUNIX_API_SECRET=${BITUNIX_API_SECRET:-}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BITUNIX_BASE_URL=https://api.bitunix.com
      - DEFAULT_SYMBOL=BTCUSDT
      - DEFAULT_TIMEFRAME=5m
      - RISK_PCT=0.02
      - DRY_RUN=true
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./fibonacci-882-platform/data:/app/data
    networks:
      - tradehub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./fibonacci-882-platform/frontend
    container_name: fib882-frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tradehub-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fib-router.rule=Host(`fib.thesolution.at`)"
      - "traefik.http.routers.fib-router.tls=true"
      - "traefik.http.routers.fib-router.middlewares=fib-trading-auth"
      - "traefik.http.middlewares.fib-trading-auth.basicauth.users=owner:$$apr1$$y.Usukd9$$mCpYYvB1OBHCfULMnn0/f."
      - "traefik.http.services.fib-router.loadbalancer.server.port=80"

networks:
  tradehub-network:
    external: true
